<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main gradient - deep purple to vibrant blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <!-- Accent gradient for the wave -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.95"/>
    </linearGradient>
    <!-- Subtle shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4c1d95" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Inner subtle highlight -->
  <rect x="48" y="48" width="416" height="208" rx="80" ry="80" fill="white" fill-opacity="0.1"/>
  
  <!-- Stylized "A" formed by sound waves - representing voice/aria -->
  <g transform="translate(256, 256)">
    <!-- Center wave (tallest - the peak of the A) -->
    <rect x="-16" y="-120" width="32" height="240" rx="16" fill="url(#waveGrad)"/>
    
    <!-- Left waves -->
    <rect x="-72" y="-80" width="28" height="160" rx="14" fill="url(#waveGrad)" opacity="0.9"/>
    <rect x="-120" y="-48" width="24" height="96" rx="12" fill="url(#waveGrad)" opacity="0.75"/>
    <rect x="-160" y="-28" width="20" height="56" rx="10" fill="url(#waveGrad)" opacity="0.55"/>
    
    <!-- Right waves -->
    <rect x="44" y="-80" width="28" height="160" rx="14" fill="url(#waveGrad)" opacity="0.9"/>
    <rect x="96" y="-48" width="24" height="96" rx="12" fill="url(#waveGrad)" opacity="0.75"/>
    <rect x="140" y="-28" width="20" height="56" rx="10" fill="url(#waveGrad)" opacity="0.55"/>
  </g>
</svg>
